<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Okai Docs local</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Aptos, "Segoe UI Variable", "Segoe UI", -apple-system,
          BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        background: #f3f3f3;
        color: #242424;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      body.bare {
        grid-template-rows: 1fr;
      }

      body.bare header {
        display: none;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: center;
        min-height: 48px;
        padding: 7px 14px;
        border-bottom: 1px solid #d0d0d0;
        background: #fafafa;
      }

      h1 {
        margin: 0;
        overflow: hidden;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tabs {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 4px;
        padding: 3px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        background: #f1f1f1;
      }

      button {
        min-width: 118px;
        height: 30px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #242424;
        font: inherit;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        background: #ffffff;
        color: #111111;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.08),
          inset 0 0 0 1px rgba(0, 0, 0, 0.04);
      }

      .status {
        min-width: 156px;
        overflow: hidden;
        color: #616161;
        font-size: 12px;
        line-height: 1.2;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      main {
        min-height: 0;
        background: #f3f3f3;
      }

      #editorHost,
      #editor {
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      .fallback {
        display: grid;
        height: 100%;
        place-items: center;
        padding: 24px;
        color: #344256;
        text-align: center;
      }

      @media (max-width: 720px) {
        header {
          grid-template-columns: 1fr;
          align-items: stretch;
        }

        .tabs {
          grid-auto-flow: row;
        }

        button,
        .status {
          width: 100%;
          min-width: 0;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Okai Docs local</h1>
      <div class="tabs" role="group" aria-label="Tipo de arquivo">
        <button id="wordTab" type="button" data-kind="word" aria-pressed="true">
          Documento
        </button>
        <button id="cellTab" type="button" data-kind="cell" aria-pressed="false">
          Planilha
        </button>
        <button id="slideTab" type="button" data-kind="slide" aria-pressed="false">
          Apresentação
        </button>
        <button id="pdfEditTab" type="button" data-kind="pdf-edit" aria-pressed="false">
          PDF editar
        </button>
        <button
          id="pdfCommentTab"
          type="button"
          data-kind="pdf-comment"
          aria-pressed="false"
        >
          PDF comentar
        </button>
      </div>
      <div id="status" class="status">Preparando</div>
    </header>

    <main>
      <div id="editorHost"><div id="editor"></div></div>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const host = document.getElementById("editorHost");
      const buttons = Array.from(document.querySelectorAll("[data-kind]"));
      const directKinds = {
        "/word": "word",
        "/excel": "cell",
        "/cell": "cell",
        "/ppt": "slide",
        "/pptx": "slide",
        "/slides": "slide",
        "/presentation": "slide",
        "/presentationeditor": "slide",
        "/powerpoint": "slide",
        "/slide": "slide",
        "/pdf-edit": "pdf-edit",
        "/pdf-comment": "pdf-comment",
        "/pdf-readonly": "pdf-readonly",
      };
      const directKind = directKinds[window.location.pathname] || null;
      let editor = null;
      let editorUrl = window.location.origin;
      let editorStartupMode = null;
      let editorStartupModeApplied = false;
      let currentKind = "word";
      const flushRequestType = "okai-docs:flush-request";
      const flushResponseType = "okai-docs:flush-response";

      function setStatus(value) {
        statusEl.textContent = value;
      }

      function setSelected(kind) {
        for (const button of buttons) {
          button.setAttribute("aria-pressed", String(button.dataset.kind === kind));
        }
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function getEditorApi() {
        const frame = document.querySelector(
          "#editor iframe, iframe[name='frameEditor'], iframe",
        );
        return frame?.contentWindow?.Asc?.editor || null;
      }

      async function flushActiveEditor() {
        const api = getEditorApi();
        if (!api) {
          throw new Error("Editor ainda não está pronto para salvar.");
        }

        try {
          api.asc_closeCellEditor?.();
        } catch {
          // Some editor types do not expose an active cell editor.
        }

        await wait(100);

        try {
          api.asc_setIsForceSaveOnUserSave?.(true);
        } catch {
          // Older editor builds may not expose this toggle.
        }

        const requested = [];
        for (const method of ["asc_Save", "forceSave"]) {
          if (typeof api[method] !== "function") {
            continue;
          }

          try {
            requested.push(method);
            api[method]();
          } catch (error) {
            console.warn("Okai Docs editor flush failed", method, error);
          }

          await wait(250);
        }

        return {
          kind: currentKind,
          requested,
        };
      }

      window.addEventListener("message", async (event) => {
        const data = event.data;
        if (
          !data ||
          data.type !== flushRequestType ||
          event.source !== window.parent
        ) {
          return;
        }

        const requestId = data.requestId || null;
        const targetOrigin = event.origin || "*";
        try {
          const result = await flushActiveEditor();
          event.source.postMessage(
            {
              type: flushResponseType,
              requestId,
              ok: true,
              ...result,
            },
            targetOrigin,
          );
        } catch (error) {
          event.source.postMessage(
            {
              type: flushResponseType,
              requestId,
              ok: false,
              message:
                error && typeof error.message === "string"
                  ? error.message
                  : "Não foi possível preparar o editor para salvar.",
            },
            targetOrigin,
          );
        }
      });

      function applyMacWordLook() {
        const frame = document.querySelector(
          "#editor iframe, iframe[name='frameEditor'], iframe",
        );
        const frameDocument = frame?.contentDocument;
        if (!frameDocument) return;

        if (frameDocument.title && frameDocument.title !== "Okai Docs") {
          frameDocument.title = "Okai Docs";
        }

        const styleId = "okai-mac-word-look";
        if (frameDocument.getElementById(styleId)) return;

        const style = frameDocument.createElement("style");
        style.id = styleId;
        style.textContent = `
          :root {
            --okai-word-bg: #f3f3f3;
            --okai-word-panel: #fbfbfb;
            --okai-word-surface: #ffffff;
            --okai-word-line: #d0d0d0;
            --okai-word-line-soft: #e1e1e1;
            --okai-word-hover: #ececec;
            --okai-word-active: #dedede;
            --okai-word-text: #242424;
            --okai-word-muted: #616161;
            --okai-word-blue: #185abd;
            --okai-word-blue-soft: #eaf2ff;
          }

          html,
          body,
          #viewport {
            background: var(--okai-word-bg) !important;
            color: var(--okai-word-text) !important;
            font-family: Aptos, "Segoe UI Variable", "Segoe UI", -apple-system,
              BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif !important;
            letter-spacing: 0 !important;
          }

          #app-title,
          #box-document-title {
            display: none !important;
            height: 0 !important;
            min-height: 0 !important;
            overflow: hidden !important;
          }

          #title-doc-name {
            color: var(--okai-word-text) !important;
            font-family: inherit !important;
            font-size: 13px !important;
            font-weight: 400 !important;
          }

          #toolbar,
          .toolbar {
            background: var(--okai-word-panel) !important;
            border-bottom: 0 !important;
            box-shadow: none !important;
            color: var(--okai-word-text) !important;
            font-family: inherit !important;
          }

          #toolbar .box-tabs,
          .toolbar .box-tabs {
            background: var(--okai-word-panel) !important;
            border-bottom: 0 !important;
            height: 36px !important;
            min-height: 36px !important;
            padding-top: 7px !important;
            box-sizing: border-box !important;
          }

          #toolbar .tabs,
          .toolbar .tabs {
            position: relative !important;
            top: 2px !important;
            padding-left: 8px !important;
            height: 26px !important;
            min-height: 26px !important;
            align-items: center !important;
          }

          #toolbar .ribtab,
          .toolbar .ribtab {
            position: relative !important;
            top: 0 !important;
            height: 26px !important;
            margin: 0 3px !important;
            border: 0 !important;
            border-radius: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
          }

          #toolbar .ribtab > a,
          .toolbar .ribtab > a {
            position: relative !important;
            top: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            height: 26px !important;
            line-height: normal !important;
            padding: 0 6px !important;
            border: 0 !important;
            color: var(--okai-word-text) !important;
            font-family: inherit !important;
            font-size: 13px !important;
            font-weight: 500 !important;
            text-decoration: none !important;
            box-shadow: none !important;
          }

          #toolbar .ribtab::before,
          #toolbar .ribtab::after,
          #toolbar .ribtab > a::before,
          .toolbar .ribtab::before,
          .toolbar .ribtab::after,
          .toolbar .ribtab > a::before {
            display: none !important;
            content: none !important;
          }

          #toolbar .ribtab.active > a,
          .toolbar .ribtab.active > a {
            color: var(--okai-word-text) !important;
            font-weight: 600 !important;
          }

          #toolbar .ribtab.active > a::after,
          .toolbar .ribtab.active > a::after {
            content: "" !important;
            position: absolute !important;
            display: block !important;
            left: 8px !important;
            right: 8px !important;
            bottom: 0 !important;
            height: 2px !important;
            border: 0 !important;
            border-radius: 1px !important;
            background: var(--okai-word-blue) !important;
            box-shadow: none !important;
          }

          #toolbar .box-controls,
          .toolbar .box-controls {
            background: var(--okai-word-panel) !important;
            border-top: 0 !important;
            border-bottom: 1px solid var(--okai-word-line) !important;
            border-radius: 0 !important;
            height: 80px !important;
            min-height: 80px !important;
            padding-top: 8px !important;
            padding-bottom: 8px !important;
            box-sizing: border-box !important;
          }

          #toolbar .panel,
          #toolbar .group,
          .toolbar .panel,
          .toolbar .group {
            background: transparent !important;
          }

          .separator.long,
          .separator.short,
          #toolbar .separator,
          #statusbar .separator {
            border-left-color: var(--okai-word-line) !important;
            opacity: 1 !important;
          }

          .btn.btn-toolbar,
          .btn.btn-header,
          button.btn,
          .combo-button {
            border-radius: 3px !important;
            color: var(--okai-word-text) !important;
            font-family: inherit !important;
            transition:
              background-color 80ms ease,
              box-shadow 80ms ease !important;
          }

          .btn.btn-toolbar:not(.disabled):hover,
          .btn.btn-header:not(.disabled):hover,
          button.btn:not(.disabled):hover {
            background: var(--okai-word-hover) !important;
          }

          .btn.btn-toolbar.active,
          .btn.btn-header.active,
          .btn.active,
          .btn-group.active > .btn {
            background: var(--okai-word-active) !important;
            box-shadow: inset 0 0 0 1px #c9c9c9 !important;
          }

          [id^="window-"] .footer button.btn.normal:focus,
          [id^="window-"] .footer button.btn.normal:active,
          [id^="window-"] .footer button.btn.normal.primary,
          .asc-window .footer button.btn.normal:focus,
          .asc-window .footer button.btn.normal:active,
          .asc-window .footer button.btn.normal.primary {
            color: #ffffff !important;
            text-shadow: none !important;
          }

          .btn.disabled,
          .disabled .toolbar__icon,
          .disabled.icon,
          .btn[disabled] {
            opacity: 0.42 !important;
          }

          input,
          select,
          textarea,
          .form-control,
          .combo-view,
          .combo-button,
          .combo-dataview .view,
          .combo-dataview .item,
          .field-fontname,
          .field-fontsize {
            background: var(--okai-word-surface) !important;
            border-color: var(--okai-word-line) !important;
            border-radius: 3px !important;
            color: var(--okai-word-text) !important;
            font-family: inherit !important;
          }

          .combo-dataview .item {
            border-color: var(--okai-word-line-soft) !important;
          }

          .combo-dataview .item.selected {
            border-color: #8ab4ff !important;
            box-shadow: inset 0 0 0 1px var(--okai-word-blue) !important;
          }

          .caret {
            border-color: rgba(0, 0, 0, 0.72) !important;
          }

          #editor-container,
          .layout-item.middle,
          .document-holder,
          .viewer {
            background: var(--okai-word-bg) !important;
          }

          .statusbar,
          #statusbar {
            background: #f7f7f7 !important;
            border-top: 1px solid var(--okai-word-line) !important;
            color: var(--okai-word-muted) !important;
            font-family: inherit !important;
            font-size: 12px !important;
          }

          .statusbar .btn,
          #statusbar .btn {
            color: var(--okai-word-muted) !important;
          }

          .icon,
          .toolbar__icon {
            filter: saturate(0.9) contrast(1.04) !important;
          }
        `;
        frameDocument.head.appendChild(style);
      }

      function hideEditorThemeControls() {
        const frame = document.querySelector(
          "#editor iframe, iframe[name='frameEditor'], iframe",
        );
        const frameDocument = frame?.contentDocument;
        if (!frameDocument) return;

        const styleId = "okai-hidden-theme-controls";
        if (!frameDocument.getElementById(styleId)) {
          const style = frameDocument.createElement("style");
          style.id = styleId;
          style.textContent = `
            .btn-day,
            .btn-dark-mode,
            #slot-btn-interface-theme,
            #slot-btn-dark-document {
              display: none !important;
            }

            .btn-day.closest-hidden,
            .btn-dark-mode.closest-hidden {
              display: none !important;
            }
          `;
          frameDocument.head.appendChild(style);
        }

        function removeThemeGroup() {
          for (const selector of [
            "#slot-btn-interface-theme",
            "#slot-btn-dark-document",
            ".btn-day",
            ".btn-dark-mode",
          ]) {
            for (const control of frameDocument.querySelectorAll(selector)) {
              const group = control.closest(".group");
              const next = group?.nextElementSibling;
              const previous = group?.previousElementSibling;

              if (group) {
                group.remove();
                if (next?.classList.contains("separator")) next.remove();
                if (previous?.classList.contains("separator-theme")) previous.remove();
              } else {
                control.closest(".btn-slot")?.remove();
                control.closest("button")?.remove();
                control.remove();
              }
            }
          }
        }

        removeThemeGroup();

        const frameWindow = frameDocument.defaultView;
        if (frameWindow && !frameWindow.__okaiThemeControlsObserver) {
          frameWindow.__okaiThemeControlsObserver = new MutationObserver(removeThemeGroup);
          frameWindow.__okaiThemeControlsObserver.observe(frameDocument.body, {
            childList: true,
            subtree: true,
          });
        }
      }

      function applyEditorTextFixes() {
        const frame = document.querySelector(
          "#editor iframe, iframe[name='frameEditor'], iframe",
        );
        const frameDocument = frame?.contentDocument;
        const frameWindow = frame?.contentWindow;
        if (!frameDocument?.body || !frameWindow) return;

        const replacements = [
          ["Página Inicial", "Home"],
          ["Pagina Inicial", "Home"],
          ["Regras", "Réguas"],
        ];
        const attributes = [
          "aria-label",
          "data-hint",
          "data-original-title",
          "data-tooltip",
          "title",
        ];

        function replaceText(value) {
          let next = value;
          for (const [from, to] of replacements) {
            next = next.replace(new RegExp(`\\b${from}\\b`, "g"), to);
          }
          return next;
        }

        function patchElement(element) {
          for (const attribute of attributes) {
            const value = element.getAttribute?.(attribute);
            if (!value) continue;
            const next = replaceText(value);
            if (next !== value) element.setAttribute(attribute, next);
          }
        }

        function patchTextNode(node) {
          const value = node.nodeValue || "";
          const next = replaceText(value);
          if (next !== value) node.nodeValue = next;
        }

        function patchTree(root) {
          if (!root) return;
          if (root.nodeType === 1) patchElement(root);
          if (root.nodeType === 3) patchTextNode(root);

          if (root.querySelectorAll) {
            for (const element of root.querySelectorAll("*")) {
              patchElement(element);
            }
          }

          const nodeFilter = frameWindow.NodeFilter || window.NodeFilter;
          if (!nodeFilter) return;
          const walker = frameDocument.createTreeWalker(
            root.nodeType === 1 ? root : frameDocument.body,
            nodeFilter.SHOW_TEXT,
          );
          let node = walker.nextNode();
          while (node) {
            patchTextNode(node);
            node = walker.nextNode();
          }
        }

        patchTree(frameDocument.body);

        if (!frameWindow.__okaiTextFixesObserver) {
          const Observer = frameWindow.MutationObserver || window.MutationObserver;
          frameWindow.__okaiTextFixesObserver = new Observer((mutations) => {
            for (const mutation of mutations) {
              if (mutation.type === "characterData") {
                patchTextNode(mutation.target);
                continue;
              }
              if (mutation.type === "attributes") {
                patchElement(mutation.target);
                continue;
              }
              for (const node of mutation.addedNodes) {
                patchTree(node);
              }
            }
          });
          frameWindow.__okaiTextFixesObserver.observe(frameDocument.body, {
            attributes: true,
            attributeFilter: attributes,
            characterData: true,
            childList: true,
            subtree: true,
          });
        }
      }

      function getControlText(control) {
        return (control.innerText || control.textContent || control.getAttribute("aria-label") || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function isUnavailableControl(control) {
        return (
          !control ||
          control.disabled ||
          control.getAttribute("aria-disabled") === "true" ||
          control.closest(".disabled")
        );
      }

      function findPdfEditModeButton(frameDocument) {
        const textCandidates = Array.from(
          frameDocument.querySelectorAll("button, [role='button'], .btn-toolbar"),
        );
        const textButton = textCandidates.find((control) =>
          /Editar\s+PDF/i.test(getControlText(control)),
        );
        if (textButton) return textButton;

        const editIcon = frameDocument.querySelector(".btn-edit-text");
        return editIcon?.closest("button, [role='button'], .btn-toolbar") || null;
      }

      function findPdfCommentTab(frameDocument) {
        return Array.from(
          frameDocument.querySelectorAll(
            "[role='tab'], .ribbon-tab, .menu-item, .toolbar-tab, .tab, button, a",
          ),
        ).find((control) => {
          const rect = control.getBoundingClientRect();
          return rect.width > 0 && rect.height > 0 && rect.top < 130 && getControlText(control) === "Comentario";
        });
      }

      function isPdfCommentModeActive(frameDocument) {
        const bodyText = frameDocument.body?.innerText || "";
        return (
          /Apagador/i.test(bodyText) &&
          /Carimbo/i.test(bodyText) &&
          /Mostrar coment/i.test(bodyText)
        );
      }

      function activatePdfStartupMode() {
        if (!editorStartupMode || editorStartupModeApplied) return;

        const frame = document.querySelector(
          "#editor iframe, iframe[name='frameEditor'], iframe",
        );
        const frameDocument = frame?.contentDocument;
        if (!frameDocument) return;

        if (editorStartupMode === "comment" && isPdfCommentModeActive(frameDocument)) {
          editorStartupModeApplied = true;
          return;
        }

        const control =
          editorStartupMode === "edit"
            ? findPdfEditModeButton(frameDocument)
            : findPdfCommentTab(frameDocument);

        if (isUnavailableControl(control)) return;

        control.click();
        editorStartupModeApplied =
          editorStartupMode === "edit" || isPdfCommentModeActive(frameDocument);
      }

      function applyEditorPostLoadControls() {
        applyMacWordLook();
        hideEditorThemeControls();
        applyEditorTextFixes();
        activatePdfStartupMode();
      }

      function scheduleEditorPostLoadControls() {
        applyEditorPostLoadControls();

        let attempts = 0;
        const timer = window.setInterval(() => {
          applyEditorPostLoadControls();
          attempts += 1;
          if (attempts >= 40) window.clearInterval(timer);
        }, 250);
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Script ${src}`));
          document.head.appendChild(script);
        });
      }

      async function openEditor(kind) {
        currentKind = kind;
        setSelected(kind);
        setStatus("Carregando documento");

        const response = await fetch(`/config/${kind}${window.location.search}`, {
          cache: "no-store",
        });
        if (!response.ok) throw new Error(`Config ${response.status}`);

        const config = await response.json();
        editorStartupMode = config.editorConfig?.customization?.pdfStartMode || null;
        editorStartupModeApplied = false;
        config.events = {
          onAppReady: () => {
            setStatus("Abrindo documento");
            scheduleEditorPostLoadControls();
          },
          onDocumentReady: () => {
            setStatus("Pronto");
            scheduleEditorPostLoadControls();
          },
          onError: (event) => {
            console.error("Erro do editor", event);
            setStatus("Erro");
          },
          onRequestClose: () => {
            if (editor) editor.destroyEditor();
            editor = null;
            setStatus("Fechado");
          },
        };

        if (editor) {
          editor.destroyEditor();
          editor = null;
        }

        host.innerHTML = '<div id="editor"></div>';
        editor = new DocsAPI.DocEditor("editor", config);
        scheduleEditorPostLoadControls();
      }

      async function boot() {
        try {
          if (directKind) {
            document.body.classList.add("bare");
          }

          const settingsResponse = await fetch(`/settings${window.location.search}`, {
            cache: "no-store",
          });
          if (settingsResponse.ok) {
            const settings = await settingsResponse.json();
            editorUrl = settings.editorUrl || editorUrl;
          }

          await loadScript(`${editorUrl}/web-apps/apps/api/documents/api.js`);

          for (const button of buttons) {
            button.addEventListener("click", () => openEditor(button.dataset.kind));
          }

          const rawRequestedKind = new URLSearchParams(window.location.search).get("kind") || "";
          const requestedKind =
            directKinds[`/${rawRequestedKind.toLowerCase()}`] || rawRequestedKind;
          const supportedKinds = new Set(buttons.map((button) => button.dataset.kind));
          const initialKind = directKind || (supportedKinds.has(requestedKind) ? requestedKind : "word");
          await openEditor(initialKind);
        } catch (error) {
          console.error(error);
          setStatus("Indisponível");
          host.innerHTML =
            '<div class="fallback">Não foi possível carregar o documento.</div>';
        }
      }

      boot();
    </script>
  </body>
</html>
